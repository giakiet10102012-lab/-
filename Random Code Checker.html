<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Random Code Checker</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #1e1e1e;
      color: #f0f0f0;
      padding: 20px;
      max-width: 600px;
      margin: auto;
    }
    input, button, textarea {
      width: 100%;
      margin: 8px 0;
      padding: 10px;
      border-radius: 6px;
      border: 1px solid #555;
      font-size: 16px;
      background-color: #333;
      color: #f0f0f0;
    }
    button {
      background-color: #4CAF50;
      color: white;
      cursor: pointer;
      transition: 0.2s;
    }
    button:hover {
      background-color: #45a049;
    }
    .output {
      margin-top: 15px;
      font-weight: bold;
      background: #444;
      color: #fff;
      padding: 10px;
      border-radius: 6px;
    }
    footer {
      text-align: center;
      margin-top: 40px;
      color: #aaa;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <h2>Trình quản lý mã & tiền thừa</h2>

  <h3>Tải file mã (mỗi dòng 1 mã):</h3>
  <input type="file" id="fileInput" accept=".txt">
  <button id="clearCodes">Xóa danh sách mã đã lưu</button>

  <h3>Chọn mã ngẫu nhiên:</h3>
  <button id="randomBtn">Chọn ngẫu nhiên</button>
  <input type="text" id="randomCode" placeholder="Mã ngẫu nhiên sẽ hiện ở đây" readonly>

  <h3>Nhập mã cần kiểm tra:</h3>
  <input type="text" id="codeInput" placeholder="Nhập mã cần kiểm tra">

  <h3>Nhập số tiền thừa:</h3>
  <input type="text" id="extraMoney" placeholder="Nhập số tiền thừa (vd: 10k, 10000, 50.000, ...)">

  <button id="saveBtn">Lưu</button>
  <button id="checkBtn">Kiểm tra</button>
  <button id="deductBtn">Trừ số dư</button>
  <input type="text" id="deductAmount" placeholder="Nhập số tiền muốn trừ">

  <div id="result" class="output"></div>

  <footer>
    © 2025 Random Code Manager | Lưu trữ dữ liệu cục bộ bằng LocalStorage.
  </footer>

  <script>
    let codes = [];
    let pendingKeys = JSON.parse(localStorage.getItem('pendingKeys') || '[]');

    const savedCodes = localStorage.getItem('codes');
    if (savedCodes) codes = JSON.parse(savedCodes);

    document.getElementById('fileInput').addEventListener('change', function(event) {
      const file = event.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = function(e) {
        codes = e.target.result.split(/\r?\n/).filter(line => line.trim() !== '');
        localStorage.setItem('codes', JSON.stringify(codes));
        codes.forEach(code => {
          if(!localStorage.getItem(code) && !pendingKeys.includes(code)) pendingKeys.push(code);
        });
        localStorage.setItem('pendingKeys', JSON.stringify(pendingKeys));
        alert(`Đã tải ${codes.length} mã thành công và lưu vào bộ nhớ!`);
      };
      reader.readAsText(file);
    });

    document.getElementById('clearCodes').addEventListener('click', function() {
      localStorage.removeItem('codes');
      localStorage.removeItem('pendingKeys');
      codes = [];
      pendingKeys = [];
      alert('Đã xóa danh sách mã đã lưu.');
    });

    document.getElementById('randomBtn').addEventListener('click', function() {
      if (codes.length === 0) {
        alert('Chưa có danh sách mã. Hãy tải file trước.');
        return;
      }
      const randomCode = codes[Math.floor(Math.random() * codes.length)];
      document.getElementById('randomCode').value = randomCode;
    });

    function parseMoney(value) {
      value = value.toLowerCase().replace(/\s|\.|,/g, '');
      if (value.endsWith('k')) return parseInt(value.replace('k','')) * 1000;
      if (value.endsWith('đ') || value.endsWith('d')) value = value.replace(/[đd]/g, '');
      const num = parseInt(value);
      return isNaN(num) ? null : num;
    }

    function updatePending(code, money){
      if(money <= 0){
        if(!pendingKeys.includes(code)) pendingKeys.push(code);
      } else {
        const index = pendingKeys.indexOf(code);
        if(index !== -1) pendingKeys.splice(index,1);
      }
      localStorage.setItem('pendingKeys', JSON.stringify(pendingKeys));
    }

    document.getElementById('saveBtn').addEventListener('click', function() {
      const code = document.getElementById('codeInput').value.trim();
      const moneyInput = document.getElementById('extraMoney').value.trim();
      const money = parseMoney(moneyInput);

      if(!code || money === null){
        alert('Hãy nhập mã và số tiền hợp lệ (vd: 10k, 10000, 50.000, ...)');
        return;
      }

      localStorage.setItem(code, money);
      updatePending(code, money);

      document.getElementById('result').textContent = `Đã lưu mã ${code} với số tiền thừa ${money.toLocaleString('vi-VN')}₫.`;
    });

    document.getElementById('checkBtn').addEventListener('click', function() {
      const code = document.getElementById('codeInput').value.trim();
      if(!code){
        alert('Hãy nhập mã để kiểm tra.');
        return;
      }
      const savedMoney = parseInt(localStorage.getItem(code));
      if(!isNaN(savedMoney)){
        if(pendingKeys.includes(code)){
          document.getElementById('result').textContent = `Mã ${code} đang ở trạng thái CHỜ.`;
        } else {
          document.getElementById('result').textContent = `Mã ${code} có số tiền thừa là ${savedMoney.toLocaleString('vi-VN')}₫.`;
        }
      } else {
        document.getElementById('result').textContent = `Không tìm thấy mã ${code} trong dữ liệu đã lưu.`;
      }
    });

    document.getElementById('deductBtn').addEventListener('click', function(){
      const code = document.getElementById('codeInput').value.trim();
      const deductInput = document.getElementById('deductAmount').value.trim();
      const deductMoney = parseMoney(deductInput);

      if(!code || deductMoney === null){
        alert('Hãy nhập mã và số tiền muốn trừ hợp lệ.');
        return;
      }

      let savedMoney = parseInt(localStorage.getItem(code));
      if(isNaN(savedMoney)){
        alert('Mã không tồn tại hoặc chưa được lưu.');
        return;
      }

      const newMoney = Math.max(0, savedMoney - deductMoney);
      localStorage.setItem(code, newMoney);
      updatePending(code, newMoney);

      document.getElementById('result').textContent = `Đã trừ ${deductMoney.toLocaleString('vi-VN')}₫ từ mã ${code}. Số dư hiện tại: ${newMoney.toLocaleString('vi-VN')}₫.`;
    });
  </script>
</body>
</html>
