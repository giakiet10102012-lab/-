<!-- index.html để lưu trên GitHub Pages -->
<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Random Code Checker</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f3f4f6;
      color: #333;
      padding: 20px;
      max-width: 600px;
      margin: auto;
    }
    input, button, textarea {
      width: 100%;
      margin: 8px 0;
      padding: 10px;
      border-radius: 6px;
      border: 1px solid #ccc;
      font-size: 16px;
    }
    button {
      background-color: #4CAF50;
      color: white;
      cursor: pointer;
      transition: 0.2s;
    }
    button:hover {
      background-color: #45a049;
    }
    .output {
      margin-top: 15px;
      font-weight: bold;
      background: #e0ffe0;
      padding: 10px;
      border-radius: 6px;
    }
    footer {
      text-align: center;
      margin-top: 40px;
      color: #777;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <h2>Trình quản lý mã & tiền thừa</h2>

  <h3>Tải file mã (mỗi dòng 1 mã):</h3>
  <input type="file" id="fileInput" accept=".txt">

  <h3>Chọn mã ngẫu nhiên:</h3>
  <button id="randomBtn">Chọn ngẫu nhiên</button>
  <input type="text" id="randomCode" placeholder="Mã ngẫu nhiên sẽ hiện ở đây" readonly>

  <h3>Nhập mã cần kiểm tra:</h3>
  <input type="text" id="codeInput" placeholder="Nhập mã cần kiểm tra">

  <h3>Nhập số tiền thừa:</h3>
  <input type="text" id="extraMoney" placeholder="Nhập số tiền thừa (vd: 10k, 10000, 50.000, ...)">

  <button id="saveBtn">Lưu</button>
  <button id="checkBtn">Kiểm tra</button>

  <div id="result" class="output"></div>

  <footer>
    © 2025 Random Code Manager | Lưu trữ dữ liệu cục bộ bằng LocalStorage.
  </footer>

  <script>
    let codes = [];

    document.getElementById('fileInput').addEventListener('change', function(event) {
      const file = event.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = function(e) {
        codes = e.target.result.split(/\r?\n/).filter(line => line.trim() !== '');
        alert(`Đã tải ${codes.length} mã thành công!`);
      };
      reader.readAsText(file);
    });

    document.getElementById('randomBtn').addEventListener('click', function() {
      if (codes.length === 0) {
        alert('Chưa có danh sách mã. Hãy tải file trước.');
        return;
      }
      const randomCode = codes[Math.floor(Math.random() * codes.length)];
      document.getElementById('randomCode').value = randomCode;
    });

    function parseMoney(value) {
      value = value.toLowerCase().replace(/\s|\.|,/g, '');
      if (value.endsWith('k')) {
        return parseInt(value.replace('k', '')) * 1000;
      }
      if (value.endsWith('đ') || value.endsWith('d')) {
        value = value.replace(/[đd]/g, '');
      }
      const num = parseInt(value);
      return isNaN(num) ? null : num;
    }

    document.getElementById('saveBtn').addEventListener('click', function() {
      const code = document.getElementById('codeInput').value.trim();
      let moneyInput = document.getElementById('extraMoney').value.trim();
      const money = parseMoney(moneyInput);
      if (!code || money === null) {
        alert('Hãy nhập mã và số tiền hợp lệ (vd: 10k, 10000, 50.000, ...).');
        return;
      }
      localStorage.setItem(code, money);
      document.getElementById('result').textContent = `Đã lưu mã ${code} với số tiền thừa ${money.toLocaleString('vi-VN')}₫.`;
    });

    document.getElementById('checkBtn').addEventListener('click', function() {
      const code = document.getElementById('codeInput').value.trim();
      if (!code) {
        alert('Hãy nhập mã để kiểm tra.');
        return;
      }
      const savedMoney = localStorage.getItem(code);
      if (savedMoney) {
        document.getElementById('result').textContent = `Mã ${code} có số tiền thừa là ${parseInt(savedMoney).toLocaleString('vi-VN')}₫.`;
      } else {
        document.getElementById('result').textContent = `Không tìm thấy mã ${code} trong dữ liệu đã lưu.`;
      }
    });
  </script>
</body>
</html>
